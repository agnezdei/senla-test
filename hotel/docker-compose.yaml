version: '3.8'

services:
  db:
    image: postgres:15
    container_name: hotel-db
    environment:
      POSTGRES_DB: hotel
      POSTGRES_USER: mac
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mac -d hotel"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotel-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/usr/local/tomcat/logs

volumes:
  postgres_data: